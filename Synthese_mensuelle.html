<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Synthèse mensuelle qualité des eaux - BV Arguenon</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f5f5f5;
}

header {
    position: relative;
    text-align: center;
    margin-bottom: 50px;
}

header .logo {
    position: absolute;
    top: 0;
    right: 0;
    width: 150px;
    height: auto;
}

h1 {
    margin: 10px 0;
}

#date {
    margin-bottom: 20px;
    font-size: 1.1em;
}

.section {
    margin-bottom: 60px;
}

h2 {
    margin-bottom: 20px;
}

.figure {
    text-align: center;
    margin-bottom: 30px;
}

.figure img {
    max-width: 90%;
    height: auto;
    border: 1px solid #ccc;
}

.figure a {
    display: block;
    margin-top: 5px;
    font-size: 0.9em;
    color: #0073e6;
    text-decoration: none;
}

.table-container {
    margin: 20px auto;
    max-width: 90%;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

table, th, td {
    border: 1px solid #ccc;
}

th, td {
    padding: 8px;
    text-align: center;
}

table th {
    background-color: #e0e0e0;
}

/* Section double colonne pour carte et tableau */
.flex-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
}
.flex-section div {
    flex: 1;
    text-align: center; /* centre les images et titres */
}
.flex-section .left img {
    max-width: 350px;
}
.flex-section .right img {
    max-width: 450px; /* image de droite plus grande */
}
</style>
</head>
<body>

<!-- Header -->
<header>
    <h1>Synthèse mensuelle qualité des eaux - BV Arguenon</h1>
    <p id="date">23 mars 2026</p>
    <img src="https://galyelise.github.io/synthese_2026/logo%20smap.png" 
         alt="Logo BV Arguenon" class="logo">
</header>

<!-- Section double colonne : carte et tableau -->
<div class="section flex-section">

    <!-- Colonne gauche : carte -->
    <div class="left">
        <h2>Stations de mesures sur le bassin versant de l'Arguenon</h2>
        <a href="https://galyelise.github.io/synthese_2026/Carte_du_reseau_2026.png" target="_blank">
            <img src="https://galyelise.github.io/synthese_2026/Carte_du_reseau_2026.png" 
                 alt="Carte des stations">
        </a>
    </div>

    <!-- Colonne droite : tableau -->
    <div class="right">
        <h2>Les réseaux de suivi de la qualité de l'eau sur le territoire</h2>
        <a href="https://galyelise.github.io/synthese_2026/Reseaux_de_suivi_qualite_Arguenon.png" target="_blank">
            <img src="https://galyelise.github.io/synthese_2026/Reseaux_de_suivi_qualite_Arguenon.png" 
                 alt="Tableau réseaux">
        </a>
    </div>

</div>

<!-- Section Identification en dessous -->
<div class="section" style="text-align:center;">
    <h2>Identification et localisation des stations de prélèvements</h2>
    <a href="https://galyelise.github.io/synthese_2026/Id_loc_stations_prelevements.png" target="_blank">
        <img src="https://galyelise.github.io/synthese_2026/Id_loc_stations_prelevements.png" 
             alt="Tableau identification stations" style="max-width:600px; width:90%; border:1px solid #ccc;">
    </a>
</div>
